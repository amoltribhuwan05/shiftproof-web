<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="60%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#2e1065"/>
    </linearGradient>
    <radialGradient id="shine" cx="40%" cy="18%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="doorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="houseShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0d9f7"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="114" fill="url(#bg)"/>
  <!-- Soft inner shine -->
  <rect width="512" height="512" rx="114" fill="url(#shine)"/>

  <!-- ─────────────────────────────────────────────
       HOUSE BODY (white, fills generous area)
       x=118 to x=394 → width 276
       y=252 to y=432 → height 180
  ───────────────────────────────────────────── -->
  <rect x="118" y="252" width="276" height="180" rx="8" fill="url(#houseShade)"/>

  <!-- ─────────────────────────────────────────────
       ROOF  (clean filled triangle, overlaps body top)
       Peak: (256, 92)
       Left base: (96, 260)
       Right base: (416, 260)
  ───────────────────────────────────────────── -->
  <polygon
    points="256,92 96,260 416,260"
    fill="white"
  />

  <!-- Roof ridge line for subtle depth -->
  <line x1="256" y1="92" x2="256" y2="126" stroke="#c4b5fd" stroke-width="4" stroke-linecap="round" opacity="0.5"/>

  <!-- ─────────────────────────────────────────────
       ARCHED DOOR (orange — the unique element)
       Arch top: semicircle radius=48, center=(256,318)
       Sides down to y=432
       Width=96, x=208 to x=304
  ───────────────────────────────────────────── -->
  <path
    d="M 208,432 L 208,318 A 48,48 0 0,1 304,318 L 304,432 Z"
    fill="url(#doorGrad)"
  />
  <!-- Door handle -->
  <circle cx="291" cy="380" r="6" fill="white" opacity="0.7"/>

  <!-- ─────────────────────────────────────────────
       TWO WINDOWS — symmetric, clean
  ───────────────────────────────────────────── -->
  <!-- Left window -->
  <rect x="138" y="274" width="60" height="52" rx="10" fill="#ddd6fe" opacity="0.55"/>
  <!-- Left window panes -->
  <line x1="168" y1="274" x2="168" y2="326" stroke="#7c3aed" stroke-width="3" opacity="0.35"/>
  <line x1="138" y1="300" x2="198" y2="300" stroke="#7c3aed" stroke-width="3" opacity="0.35"/>

  <!-- Right window -->
  <rect x="314" y="274" width="60" height="52" rx="10" fill="#ddd6fe" opacity="0.55"/>
  <!-- Right window panes -->
  <line x1="344" y1="274" x2="344" y2="326" stroke="#7c3aed" stroke-width="3" opacity="0.35"/>
  <line x1="314" y1="300" x2="374" y2="300" stroke="#7c3aed" stroke-width="3" opacity="0.35"/>

  <!-- ─────────────────────────────────────────────
       VERIFICATION BADGE — bottom-right corner
       Orange circle + white checkmark
       This adds the "Proof" meaning cleanly
  ───────────────────────────────────────────── -->
  <circle cx="374" cy="392" r="42" fill="#1e1b4b" opacity="0.6"/>
  <circle cx="374" cy="392" r="36" fill="#f97316"/>
  <!-- Checkmark inside badge -->
  <path
    d="M 356,392 L 369,406 L 394,376"
    stroke="white"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
